name: Terraform toolchain
description: Install the toolchain pinned in mise.toml (terraform, tflint, trivy) for the target directory.

inputs:
  working-directory:
    description: Directory whose mise.toml (merged with the repo-root one) defines the toolchain to install.
    required: false
    default: '.'

runs:
  using: composite
  steps:
    # Installs every tool from the merged mise.toml (repo root + the working dir) and
    # puts them on PATH; mise then resolves the right version per directory at run time.
    - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        working_directory: ${{ inputs.working-directory }}
        # Pinned for reproducible CI; bumped by Renovate via the annotation below.
        # renovate: datasource=github-releases depName=jdx/mise
        version: v2026.6.14
