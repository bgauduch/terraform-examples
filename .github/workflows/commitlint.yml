name: Commit messages

on:
  push:
    branches-ignore: [main]

concurrency:
  group: commitlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Conventional commits
    # Bot branches (dependabot, release-please) carry machine-generated commit bodies that get
    # discarded on squash-merge; their conventional-commit contract on `main` is enforced by the
    # Semantic PR title check instead. Skip per-commit linting to avoid noise on bot PRs.
    if: >-
      github.actor != 'dependabot[bot]' &&
      !startsWith(github.ref_name, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
